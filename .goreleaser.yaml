version: 2

project_name: matlock

before:
  hooks:
    - go mod tidy

builds:
  - id: matlock
    main: .
    binary: matlock
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/stxkxs/matlock/cmd.Version={{ .Version }}
      - -X github.com/stxkxs/matlock/cmd.Commit={{ .Commit }}
      - -X github.com/stxkxs/matlock/cmd.BuildDate={{ .Date }}
    env:
      - CGO_ENABLED=0

archives:
  - id: matlock
    ids:
      - matlock
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

brews:
  - name: matlock
    repository:
      owner: stxkxs
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/stxkxs/matlock"
    description: "Multi-cloud security and cost swiss army knife — audit IAM permissions, spot cost anomalies, find orphaned resources, and flag insecure storage across AWS, GCP, and Azure"
    license: "MIT"
    test: |
      system "#{bin}/matlock", "--version"
    install: |
      bin.install "matlock"

release:
  github:
    owner: stxkxs
    name: matlock
  draft: false
  prerelease: auto
